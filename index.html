<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🫏 Guess the Number — P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js">
    </script>
    <style>
        /* same as before */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e94560, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            background: #0f0f1a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #e94560;
        }
        .input-group button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #0ea5e9);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .input-group button:hover {
            transform: scale(1.02);
        }
        .peer-id-box {
            background: #0f0f1a;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #1a1a3a;
            text-align: center;
            font-size: 13px;
            color: #aaa;
            word-break: break-all;
            margin-bottom: 16px;
        }
        .peer-id-box span {
            color: #fff;
            font-weight: 600;
        }
        .game-area {
            margin-top: 16px;
            padding: 16px;
            background: #0f0f1a;
            border-radius: 12px;
            border: 1px solid #1a1a3a;
            display: none;
        }
        .game-area.active {
            display: block;
        }
        .guess-input {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .guess-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            background: #0f0f1a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .guess-input button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: #e94560;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
        .guess-history {
            margin-top: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
        .guess-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a3a;
            font-size: 13px;
            color: #aaa;
        }
        .guess-entry .name {
            color: #fff;
        }
        .guess-entry .too-high {
            color: #e94560;
        }
        .guess-entry .too-low {
            color: #4ade80;
        }
        .guess-entry .winner {
            color: #fbbf24;
        }
        .status-box {
            text-align: center;
            padding: 12px;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(14, 165, 233, 0.2);
            font-size: 14px;
            color: #aaa;
            margin-bottom: 12px;
        }
        .error {
            color: #e94560;
            font-size: 13px;
            padding: 8px 12px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(233, 69, 96, 0.2);
            margin-top: 8px;
            display: none;
        }
        .error.visible {
            display: block;
        }
        .winner-announce {
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(14, 165, 233, 0.2));
            border-radius: 12px;
            margin-top: 12px;
        }
        .winner-announce .big {
            font-size: 28px;
            font-weight: 700;
            color: #fbbf24;
        }
        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .player-tag {
            background: #1a1a3a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
        }
        .player-tag.host {
            border: 1px solid #fbbf24;
            color: #fbbf24;
        }
        .start-btn {
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #0ea5e9);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            display: none;
        }
        .start-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🫏 Guess the Number</h1>
        <p class="sub">Peer-to-Peer · No Server · Free</p>

        <div class="peer-id-box">
            Your ID: <span id="myPeerId">Connecting...</span>
        </div>

        <div class="input-group">
            <input type="text" id="peerInput" placeholder="Enter peer ID to connect..." />
            <button id="connectBtn">Connect</button>
        </div>

        <div class="input-group">
            <button id="hostBtn" style="flex:1;">👑 Host Game</button>
        </div>

        <div class="error" id="error"></div>

        <div class="game-area" id="gameArea">
            <div class="status-box" id="statusBox">Waiting for host to start...</div>
            <div class="player-list" id="playerList"></div>

            <div id="gameContent">
                <div id="waitingMessage" style="text-align:center;color:#555;padding:12px;">
                    Waiting for host to start the game...
                </div>

                <div id="gameActive" style="display:none;">
                    <div style="display:flex;justify-content:space-between;font-size:14px;color:#aaa;margin-bottom:8px;">
                        <span>Guesses: <span id="guessCount">0</span></span>
                        <span>Remaining: <span id="remainingGuesses">10</span></span>
                    </div>
                    <div class="guess-input">
                        <input type="number" id="guessInput" min="1" max="100" placeholder="Your guess..." />
                        <button id="guessBtn">Guess</button>
                    </div>
                    <div class="guess-history" id="guessHistory"></div>
                </div>

                <div id="gameFinished" style="display:none;">
                    <div class="winner-announce">
                        <div class="big">🏆</div>
                        <div style="font-size:20px;font-weight:600;margin:8px 0;" id="winnerName">—</div>
                        <div style="color:#888;font-size:14px;">The number was <span id="winningNumber">—</span></div>
                    </div>
                </div>
            </div>

            <button class="start-btn" id="startGameBtn">🚀 Start Game</button>
        </div>
    </div>

    <script>
        // ─── State ──────────────────────────────────────────────────
        let peer = null;
        let conn = null;
        let isHost = false;
        let gameActive = false;
        let gameFinished = false;
        let number = null;
        let guesses = [];
        let players = [];
        let playerName = 'Player';
        let isConnected = false;
        let myId = null;

        // ─── DOM ────────────────────────────────────────────────────
        const myPeerId = document.getElementById('myPeerId');
        const peerInput = document.getElementById('peerInput');
        const connectBtn = document.getElementById('connectBtn');
        const hostBtn = document.getElementById('hostBtn');
        const error = document.getElementById('error');
        const gameArea = document.getElementById('gameArea');
        const statusBox = document.getElementById('statusBox');
        const playerList = document.getElementById('playerList');
        const waitingMessage = document.getElementById('waitingMessage');
        const gameActiveDiv = document.getElementById('gameActive');
        const gameFinishedDiv = document.getElementById('gameFinished');
        const guessInput = document.getElementById('guessInput');
        const guessBtn = document.getElementById('guessBtn');
        const guessHistory = document.getElementById('guessHistory');
        const guessCount = document.getElementById('guessCount');
        const remainingGuesses = document.getElementById('remainingGuesses');
        const startGameBtn = document.getElementById('startGameBtn');
        const winnerName = document.getElementById('winnerName');
        const winningNumber = document.getElementById('winningNumber');

        // ─── PeerJS ──────────────────────────────────────────────────
        function initPeer() {
            peer = new Peer(undefined, { debug: 0 });

            peer.on('open', (id) => {
                myId = id;
                myPeerId.textContent = id;
                showError(null);
                console.log('🟢 Peer ready:', id);
            });

            peer.on('connection', (incoming) => {
                console.log('📥 Incoming connection from:', incoming.peer);
                conn = incoming;
                isConnected = true;
                setupConnection();

                if (isHost) {
                    sendMessage({
                        type: 'init',
                        players: players,
                        isHost: true,
                        hostId: peer.id
                    });
                    statusBox.innerHTML = '🔗 Player connected!';
                    updateUI();
                }

                gameArea.classList.add('active');
                showError(null);
            });

            peer.on('error', (err) => {
                console.error('❌ Peer error:', err);
                showError('Peer error: ' + err.message);
            });

            peer.on('disconnected', () => {
                statusBox.innerHTML = '⚠️ Disconnected.';
                isConnected = false;
            });
        }

        // ─── Connection Setup ──────────────────────────────────────
        function setupConnection() {
            conn.on('data', (data) => {
                handleMessage(data);
            });

            conn.on('close', () => {
                console.log('🔴 Connection closed');
                isConnected = false;
                statusBox.innerHTML = '🔴 Peer disconnected.';
                gameArea.classList.remove('active');
                startGameBtn.style.display = 'none';
            });

            conn.on('error', (err) => {
                console.error('❌ Connection error:', err);
                showError('Connection error: ' + err.message);
            });
        }

        // ─── Send Message ──────────────────────────────────────────
        function sendMessage(msg) {
            if (conn && conn.open && isConnected) {
                conn.send(msg);
                console.log('📤 Sent:', msg);
            } else {
                console.warn('⚠️ Cannot send: connection not ready');
            }
        }

        // ─── Handle Messages ──────────────────────────────────────
        function handleMessage(data) {
            console.log('📨 Received:', data);

            switch (data.type) {
                case 'init':
                    if (data.isHost) {
                        players = data.players || [];
                        isHost = false;
                        isConnected = true;
                        gameArea.classList.add('active');
                        statusBox.innerHTML = '👋 Joined game. Waiting for host to start.';
                        waitingMessage.style.display = 'block';
                        gameActiveDiv.style.display = 'none';
                        gameFinishedDiv.style.display = 'none';
                        startGameBtn.style.display = 'none';
                        updateUI();
                        showError(null);
                    } else {
                        if (isHost) {
                            const newPlayer = { id: data.playerName || data.playerId, name: data.playerName || 'Player' };
                            if (!players.find(p => p.id === newPlayer.id)) {
                                players.push(newPlayer);
                            }
                            sendMessage({
                                type: 'init',
                                players: players,
                                isHost: true,
                                hostId: peer.id
                            });
                            updateUI();
                            statusBox.innerHTML = `👥 ${players.length} players connected`;
                        }
                    }
                    break;

                case 'start-game':
                    number = data.number;
                    gameActive = true;
                    gameFinished = false;
                    guesses = [];
                    waitingMessage.style.display = 'none';
                    gameActiveDiv.style.display = 'block';
                    gameFinishedDiv.style.display = 'none';
                    startGameBtn.style.display = 'none';
                    guessCount.textContent = '0';
                    remainingGuesses.textContent = '10';
                    guessHistory.innerHTML = '';
                    guessInput.disabled = false;
                    guessBtn.disabled = false;
                    statusBox.innerHTML = '🎮 Game started! Guess the number.';
                    updateUI();
                    break;

                case 'guess':
                    // ✅ Only add if it's NOT our own guess (avoid duplication)
                    if (data.playerId !== myId) {
                        const entry = {
                            player: data.player,
                            guess: data.guess,
                            feedback: data.feedback,
                        };
                        guesses.push(entry);
                        addGuessToHistory(entry);
                        guessCount.textContent = guesses.length;
                        remainingGuesses.textContent = 10 - guesses.length;

                        if (data.feedback === 'winner') {
                            gameActive = false;
                            gameFinished = true;
                            gameActiveDiv.style.display = 'none';
                            gameFinishedDiv.style.display = 'block';
                            winnerName.textContent = data.player;
                            winningNumber.textContent = number;
                            statusBox.innerHTML = '🏆 Game finished!';
                            guessInput.disabled = true;
                            guessBtn.disabled = true;
                            startGameBtn.style.display = 'none';
                        }
                        updateUI();
                    }
                    break;

                case 'state-sync':
                    if (data.players) players = data.players;
                    if (data.guesses) guesses = data.guesses;
                    if (data.number) number = data.number;
                    if (data.gameActive !== undefined) gameActive = data.gameActive;
                    if (data.gameFinished !== undefined) gameFinished = data.gameFinished;
                    updateUI();
                    break;
            }
        }

        // ─── UI Updates ─────────────────────────────────────────────
        function updateUI() {
            playerList.innerHTML = players.map(p =>
                `<span class="player-tag ${p.id === peer?.id ? 'host' : ''}">${p.name} ${p.id === peer?.id ? '👑' : ''}</span>`
            ).join('');

            if (isHost && !gameActive && !gameFinished) {
                if (players.length >= 2) {
                    startGameBtn.style.display = 'block';
                    startGameBtn.textContent = `🚀 Start Game (${players.length} players)`;
                } else {
                    startGameBtn.style.display = 'none';
                }
            } else {
                startGameBtn.style.display = 'none';
            }

            if (isHost && !gameActive && !gameFinished) {
                waitingMessage.textContent = players.length < 2 ?
                    'Waiting for players to join...' :
                    'Ready to start! Click "Start Game" below.';
            }
        }

        function addGuessToHistory(entry) {
            const div = document.createElement('div');
            div.className = 'guess-entry';
            const cls = entry.feedback === 'too-high' ? 'too-high' :
                entry.feedback === 'too-low' ? 'too-low' : 'winner';
            const label = entry.feedback === 'too-high' ? '⬆️ Too high' :
                entry.feedback === 'too-low' ? '⬇️ Too low' : '🎯 WINNER!';
            div.innerHTML =
                `<span class="name">${entry.player}</span><span class="guess ${cls}">${entry.guess} — ${label}</span>`;
            guessHistory.appendChild(div);
            guessHistory.scrollTop = guessHistory.scrollHeight;
        }

        // ─── Show Error ─────────────────────────────────────────────
        function showError(msg) {
            if (msg) {
                error.textContent = msg;
                error.classList.add('visible');
            } else {
                error.classList.remove('visible');
            }
        }

        // ─── Host Game ──────────────────────────────────────────────
        function hostGame() {
            const name = prompt('Enter your name:', 'Host') || 'Host';
            playerName = name;
            isHost = true;
            players = [{ id: peer.id, name: playerName }];
            gameArea.classList.add('active');
            statusBox.innerHTML = '👑 You are the host. Share your Peer ID with others.';
            waitingMessage.style.display = 'block';
            waitingMessage.textContent = 'Waiting for players to join...';
            gameActiveDiv.style.display = 'none';
            gameFinishedDiv.style.display = 'none';
            startGameBtn.style.display = 'none';
            updateUI();
            showError(null);

            peer.on('connection', (incoming) => {
                if (conn && conn.open) {
                    conn.close();
                }
                conn = incoming;
                isConnected = true;
                setupConnection();
                sendMessage({
                    type: 'init',
                    players: players,
                    isHost: true,
                    hostId: peer.id
                });
                statusBox.innerHTML = '🔗 Player connected!';
                updateUI();
            });
        }

        // ─── Start Game (Host) ──────────────────────────────────────
        function startGame() {
            if (!isHost || players.length < 2) {
                showError('Need at least 2 players to start.');
                return;
            }
            number = Math.floor(Math.random() * 100) + 1;
            gameActive = true;
            gameFinished = false;
            guesses = [];
            sendMessage({ type: 'start-game', number: number });
            waitingMessage.style.display = 'none';
            gameActiveDiv.style.display = 'block';
            gameFinishedDiv.style.display = 'none';
            startGameBtn.style.display = 'none';
            guessCount.textContent = '0';
            remainingGuesses.textContent = '10';
            guessHistory.innerHTML = '';
            guessInput.disabled = false;
            guessBtn.disabled = false;
            statusBox.innerHTML = '🎮 Game started! Guess the number.';
            updateUI();
            showError(null);
        }

        // ─── Make Guess ─────────────────────────────────────────────
        function makeGuess() {
            if (!gameActive) {
                showError('Game not active.');
                return;
            }
            if (!isConnected) {
                showError('Not connected to peer.');
                return;
            }
            const val = parseInt(guessInput.value);
            if (isNaN(val) || val < 1 || val > 100) {
                showError('Guess must be between 1 and 100.');
                return;
            }

            const feedback = val === number ? 'winner' : (val < number ? 'too-low' : 'too-high');

            const entry = {
                player: playerName,
                guess: val,
                feedback: feedback,
            };
            guesses.push(entry);
            addGuessToHistory(entry);
            guessCount.textContent = guesses.length;
            remainingGuesses.textContent = 10 - guesses.length;

            // ✅ Send guess with unique player ID to prevent duplication
            sendMessage({
                type: 'guess',
                player: playerName,
                playerId: myId,
                guess: val,
                feedback: feedback
            });

            if (feedback === 'winner') {
                gameActive = false;
                gameFinished = true;
                gameActiveDiv.style.display = 'none';
                gameFinishedDiv.style.display = 'block';
                winnerName.textContent = playerName;
                winningNumber.textContent = number;
                statusBox.innerHTML = '🏆 You won!';
                guessInput.disabled = true;
                guessBtn.disabled = true;
                startGameBtn.style.display = 'none';
            } else {
                guessInput.value = '';
                guessInput.focus();
            }
            updateUI();
            showError(null);
        }

        // ─── Connect to Peer ────────────────────────────────────────
        function connectToPeer() {
            const targetId = peerInput.value.trim();
            if (!targetId) {
                showError('Enter a Peer ID.');
                return;
            }
            if (!peer) {
                showError('Peer not initialized.');
                return;
            }

            if (conn && conn.open) {
                conn.close();
            }

            showError(null);
            statusBox.innerHTML = '🔗 Connecting to ' + targetId + '...';
            gameArea.classList.add('active');

            conn = peer.connect(targetId, { reliable: true });
            isConnected = true;
            setupConnection();

            setTimeout(() => {
                sendMessage({
                    type: 'init',
                    playerName: playerName,
                    playerId: peer.id
                });
            }, 500);
        }

        // ─── Event Listeners ──────────────────────────────────────
        connectBtn.addEventListener('click', connectToPeer);
        hostBtn.addEventListener('click', hostGame);
        startGameBtn.addEventListener('click', startGame);
        guessBtn.addEventListener('click', makeGuess);
        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') makeGuess();
        });
        peerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') connectToPeer();
        });

        // ─── Init ────────────────────────────────────────────────────
        initPeer();

        console.log('🫏 Guess the Number — P2P Ready');
    </script>

</body>
</html>
