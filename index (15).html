<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🫏 Guess the Number</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2a4a;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #e94560, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            background: #0f0f1a;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: #e94560;
        }

        .input-group button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #e94560, #0ea5e9);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .input-group button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .input-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .room-list {
            margin-top: 20px;
        }

        .room-item {
            background: #0f0f1a;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1a1a3a;
            cursor: pointer;
            transition: background 0.2s, border 0.2s;
        }

        .room-item:hover {
            background: #1a1a3a;
            border-color: #e94560;
        }

        .room-item .code {
            font-weight: 600;
            font-size: 16px;
            color: #fff;
        }

        .room-item .info {
            color: #888;
            font-size: 13px;
        }

        .room-item .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status.waiting {
            background: #1a3a2a;
            color: #4ade80;
        }
        .status.playing {
            background: #3a1a2a;
            color: #e94560;
        }
        .status.finished {
            background: #1a1a3a;
            color: #888;
        }

        .game-area {
            margin-top: 20px;
            padding: 20px;
            background: #0f0f1a;
            border-radius: 16px;
            border: 1px solid #1a1a3a;
            display: none;
        }

        .game-area.active {
            display: block;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 14px;
            color: #aaa;
        }

        .game-info span {
            color: #fff;
            font-weight: 600;
        }

        .guess-input {
            display: flex;
            gap: 10px;
        }

        .guess-input input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            background: #0f0f1a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .guess-input input:focus {
            border-color: #e94560;
        }

        .guess-input button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: #e94560;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .guess-input button:hover {
            transform: scale(1.02);
        }

        .guess-history {
            margin-top: 16px;
            max-height: 150px;
            overflow-y: auto;
        }

        .guess-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a3a;
            font-size: 13px;
            color: #aaa;
        }

        .guess-entry .name {
            color: #fff;
        }

        .guess-entry .guess {
            font-weight: 600;
        }
        .guess-entry .too-high {
            color: #e94560;
        }
        .guess-entry .too-low {
            color: #4ade80;
        }
        .guess-entry .winner {
            color: #fbbf24;
        }

        .winner-announce {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.2), rgba(14, 165, 233, 0.2));
            border-radius: 16px;
            margin-top: 16px;
        }

        .winner-announce .big {
            font-size: 32px;
            font-weight: 700;
            color: #fbbf24;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: #e94560;
            font-size: 13px;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(233, 69, 96, 0.2);
        }

        .players-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .player-tag {
            background: #1a1a3a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
        }

        .player-tag.host {
            border: 1px solid #fbbf24;
            color: #fbbf24;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <h1>🫏 Guess the Number</h1>
        <p class="subtitle">Multiplayer · Real-time · Free</p>

        <!-- Player Name -->
        <div class="input-group">
            <input type="text" id="playerName" placeholder="Your name..." value="Player" />
            <button id="setNameBtn">Set Name</button>
        </div>

        <!-- Create / Join -->
        <div class="input-group">
            <input type="text" id="roomInput" placeholder="Room code or create new..." />
            <button id="createBtn">Create</button>
            <button id="joinBtn">Join</button>
        </div>

        <!-- Error -->
        <div id="error" class="error hidden"></div>

        <!-- Room List -->
        <div class="room-list" id="roomList">
            <div style="text-align:center;color:#555;font-size:13px;padding:20px;">Loading rooms...</div>
        </div>

        <!-- Game Area -->
        <div class="game-area" id="gameArea">
            <div id="gameHeader">
                <div class="game-info">
                    <span>Room: <span id="roomCodeDisplay">—</span></span>
                    <span>Players: <span id="playerCount">0</span></span>
                </div>
                <div class="players-list" id="playersList"></div>
            </div>

            <div id="gameContent">
                <div style="text-align:center;color:#555;padding:20px;" id="waitingMessage">
                    Waiting for host to start the game...
                </div>

                <div id="gameActive" class="hidden">
                    <div class="game-info">
                        <span>Guesses: <span id="guessCount">0</span></span>
                        <span>Remaining: <span id="remainingGuesses">10</span></span>
                    </div>

                    <div class="guess-input">
                        <input type="number" id="guessInput" min="1" max="100" placeholder="Enter your guess..." />
                        <button id="guessBtn">Guess</button>
                    </div>

                    <div class="guess-history" id="guessHistory"></div>
                </div>

                <div id="gameFinished" class="hidden">
                    <div class="winner-announce">
                        <div class="big">🏆</div>
                        <div style="font-size:20px;font-weight:600;margin:8px 0;" id="winnerName">—</div>
                        <div style="color:#888;font-size:14px;">The number was <span id="winningNumber">—</span></div>
                    </div>
                </div>
            </div>

            <button id="startGameBtn" class="hidden" style="margin-top:12px;padding:10px 20px;border:none;border-radius:12px;background:linear-gradient(135deg,#e94560,#0ea5e9);color:#fff;font-weight:600;cursor:pointer;width:100%;">
                🚀 Start Game
            </button>
        </div>
    </div>

    <script>
        // ─── State ──────────────────────────────────────────────────
        let socket = null;
        let currentRoom = null;
        let playerName = 'Player';
        let isHost = false;
        let gameActive = false;
        let gameFinished = false;

        // ─── DOM Refs ──────────────────────────────────────────────
        const playerNameInput = document.getElementById('playerName');
        const setNameBtn = document.getElementById('setNameBtn');
        const roomInput = document.getElementById('roomInput');
        const createBtn = document.getElementById('createBtn');
        const joinBtn = document.getElementById('joinBtn');
        const roomList = document.getElementById('roomList');
        const errorDiv = document.getElementById('error');
        const gameArea = document.getElementById('gameArea');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');
        const playerCount = document.getElementById('playerCount');
        const playersList = document.getElementById('playersList');
        const waitingMessage = document.getElementById('waitingMessage');
        const gameActiveDiv = document.getElementById('gameActive');
        const gameFinishedDiv = document.getElementById('gameFinished');
        const guessInput = document.getElementById('guessInput');
        const guessBtn = document.getElementById('guessBtn');
        const guessHistory = document.getElementById('guessHistory');
        const guessCount = document.getElementById('guessCount');
        const remainingGuesses = document.getElementById('remainingGuesses');
        const startGameBtn = document.getElementById('startGameBtn');
        const winnerName = document.getElementById('winnerName');
        const winningNumber = document.getElementById('winningNumber');

        // ─── Server URL ────────────────────────────────────────────
        // Replace with your Hugging Face Space URL
        const SERVER_URL = 'https://your-hf-space.hf.space';

        // ─── Connect ────────────────────────────────────────────────
        function connect() {
            if (socket) {
                socket.disconnect();
            }

            socket = io(SERVER_URL, {
                transports: ['websocket'],
                reconnection: true,
            });

            socket.on('connect', () => {
                console.log('🟢 Connected to server');
                showError(null);
                fetchRooms();
            });

            socket.on('disconnect', () => {
                console.log('🔴 Disconnected');
                showError('Disconnected from server. Reconnecting...');
            });

            socket.on('error', (msg) => {
                showError(msg);
            });

            // ── Socket events ──
            socket.on('room-created', (data) => {
                const { roomCode } = data;
                currentRoom = roomCode;
                isHost = true;
                gameActive = false;
                gameFinished = false;
                enterRoom(roomCode);
                fetchRooms();
            });

            socket.on('room-update', (data) => {
                if (!currentRoom) return;
                updateRoomUI(data);
            });

            socket.on('game-started', (data) => {
                gameActive = true;
                gameFinished = false;
                document.getElementById('gameActive').classList.remove('hidden');
                document.getElementById('gameFinished').classList.add('hidden');
                document.getElementById('waitingMessage').classList.add('hidden');
                document.getElementById('startGameBtn').classList.add('hidden');
                guessInput.disabled = false;
                guessBtn.disabled = false;
                guessInput.value = '';
                guessHistory.innerHTML = '';
                guessCount.textContent = '0';
                remainingGuesses.textContent = '10';
                showError(null);
            });

            socket.on('game-finished', (data) => {
                gameActive = false;
                gameFinished = true;
                document.getElementById('gameActive').classList.add('hidden');
                document.getElementById('gameFinished').classList.remove('hidden');
                document.getElementById('waitingMessage').classList.add('hidden');
                guessInput.disabled = true;
                guessBtn.disabled = true;
                winnerName.textContent = data.winner;
                winningNumber.textContent = data.number;
                data.guesses.forEach(g => addGuessToHistory(g));
            });

            socket.on('guess-feedback', (data) => {
                const entry = {
                    player: playerName,
                    guess: data.guess,
                    feedback: data.feedback
                };
                addGuessToHistory(entry);
                guessCount.textContent = parseInt(guessCount.textContent) + 1;
                remainingGuesses.textContent = data.remaining;
                guessInput.value = '';
                guessInput.focus();
            });
        }

        // ─── Room Functions ──────────────────────────────────────────
        function createRoom() {
            const name = playerNameInput.value.trim() || 'Player';
            playerName = name;
            connect();
            socket.emit('create-room', { playerName: name });
        }

        function joinRoom(roomCode) {
            const name = playerNameInput.value.trim() || 'Player';
            playerName = name;
            connect();
            socket.emit('join-room', { roomCode, playerName: name });
            currentRoom = roomCode;
            isHost = false;
            enterRoom(roomCode);
        }

        function enterRoom(roomCode) {
            gameArea.classList.add('active');
            roomCodeDisplay.textContent = roomCode;
            document.querySelector('.room-list').style.display = 'none';
            document.getElementById('waitingMessage').classList.remove('hidden');
            document.getElementById('gameActive').classList.add('hidden');
            document.getElementById('gameFinished').classList.add('hidden');
            document.getElementById('startGameBtn').classList.add('hidden');
            guessInput.disabled = true;
            guessBtn.disabled = true;
            showError(null);
        }

        function startGame() {
            if (!currentRoom || !isHost) return;
            socket.emit('start-game', { roomCode: currentRoom });
        }

        function makeGuess() {
            if (!currentRoom || !gameActive) return;
            const guess = parseInt(guessInput.value);
            if (isNaN(guess) || guess < 1 || guess > 100) {
                showError('Guess must be between 1 and 100.');
                return;
            }
            socket.emit('make-guess', { roomCode: currentRoom, guess });
        }

        // ─── UI Updates ──────────────────────────────────────────────
        function updateRoomUI(room) {
            if (!room) return;

            // Players
            playerCount.textContent = room.players.length;
            playersList.innerHTML = room.players.map(p =>
                `<span class="player-tag ${p.id === room.host ? 'host' : ''}">${p.name} ${p.id === room.host ? '👑' : ''}</span>`
            ).join('');

            // Status
            if (room.status === 'waiting') {
                document.getElementById('waitingMessage').classList.remove('hidden');
                document.getElementById('gameActive').classList.add('hidden');
                document.getElementById('gameFinished').classList.add('hidden');
                document.getElementById('startGameBtn').classList.add('hidden');

                if (isHost && room.players.length >= 2) {
                    document.getElementById('startGameBtn').classList.remove('hidden');
                    document.getElementById('startGameBtn').textContent = `🚀 Start Game (${room.players.length} players)`;
                } else if (isHost) {
                    document.getElementById('startGameBtn').classList.add('hidden');
                }
            }

            if (room.status === 'playing') {
                document.getElementById('waitingMessage').classList.add('hidden');
                document.getElementById('gameActive').classList.remove('hidden');
                document.getElementById('gameFinished').classList.add('hidden');
                document.getElementById('startGameBtn').classList.add('hidden');
                guessInput.disabled = false;
                guessBtn.disabled = false;
                gameActive = true;
                gameFinished = false;
            }

            if (room.status === 'finished') {
                document.getElementById('waitingMessage').classList.add('hidden');
                document.getElementById('gameActive').classList.add('hidden');
                document.getElementById('gameFinished').classList.remove('hidden');
                document.getElementById('startGameBtn').classList.add('hidden');
                gameActive = false;
                gameFinished = true;
                if (room.winner) {
                    winnerName.textContent = room.winner;
                    winningNumber.textContent = room.number || '?';
                }
            }
        }

        function addGuessToHistory(entry) {
            const div = document.createElement('div');
            div.className = 'guess-entry';
            const feedbackClass = entry.feedback === 'too-high' ? 'too-high' :
                entry.feedback === 'too-low' ? 'too-low' : 'winner';
            const feedbackLabel = entry.feedback === 'too-high' ? '⬆️ Too high' :
                entry.feedback === 'too-low' ? '⬇️ Too low' : '🎯 WINNER!';
            div.innerHTML = `
                <span class="name">${entry.player}</span>
                <span class="guess ${feedbackClass}">${entry.guess} — ${feedbackLabel}</span>
            `;
            guessHistory.appendChild(div);
            guessHistory.scrollTop = guessHistory.scrollHeight;
        }

        function showError(msg) {
            if (msg) {
                errorDiv.textContent = msg;
                errorDiv.classList.remove('hidden');
            } else {
                errorDiv.classList.add('hidden');
            }
        }

        // ─── Fetch Rooms ─────────────────────────────────────────────
        function fetchRooms() {
            fetch(`${SERVER_URL}/api/rooms`)
                .then(res => res.json())
                .then(rooms => {
                    if (!rooms.length) {
                        roomList.innerHTML = `<div style="text-align:center;color:#555;font-size:13px;padding:20px;">No rooms available. Create one!</div>`;
                        return;
                    }
                    roomList.innerHTML = rooms.map(room => `
                        <div class="room-item" onclick="joinRoom('${room.code}')">
                            <div>
                                <div class="code">${room.code}</div>
                                <div class="info">${room.players} / ${room.maxPlayers} players</div>
                            </div>
                            <span class="status ${room.status}">${room.status}</span>
                        </div>
                    `).join('');
                })
                .catch(() => {
                    roomList.innerHTML = `<div style="text-align:center;color:#555;font-size:13px;padding:20px;">Error loading rooms. Make sure server is running.</div>`;
                });
        }

        // ─── Event Listeners ──────────────────────────────────────────
        createBtn.addEventListener('click', createRoom);
        joinBtn.addEventListener('click', () => {
            const code = roomInput.value.trim().toUpperCase();
            if (code) joinRoom(code);
            else showError('Enter a room code.');
        });

        setNameBtn.addEventListener('click', () => {
            const name = playerNameInput.value.trim() || 'Player';
            playerName = name;
            showError(null);
        });

        startGameBtn.addEventListener('click', startGame);
        guessBtn.addEventListener('click', makeGuess);
        guessInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') makeGuess();
        });

        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const code = roomInput.value.trim().toUpperCase();
                if (code) joinRoom(code);
            }
        });

        // ─── Refresh rooms every 5 seconds ──────────────────────────
        setInterval(() => {
            if (!currentRoom) fetchRooms();
        }, 5000);

        // ─── Connect on load ──────────────────────────────────────────
        connect();

        console.log('🫏 Guess the Number — Ready');
    </script>

</body>
</html>
